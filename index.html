<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>printpdf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%23b7410e'/></svg>">
</head>
<body>
    <header class="topbar">
        <div class="brand"><h1>printpdf</h1></div>
        <nav class="links">
            <a href="https://github.com/fschutt/printpdf" target="_blank" rel="noopener">GitHub</a>
            <a href="https://crates.io/crates/printpdf" target="_blank" rel="noopener">crates.io</a>
            <a href="https://docs.rs/printpdf" target="_blank" rel="noopener">docs.rs</a>
            <button id="theme-toggle" title="Toggle color scheme">◐</button>
        </nav>
    </header>

    <nav class="tabbar" role="tablist">
        <button class="tab active" role="tab" data-tab="html-to-pdf" id="tab-html">HTML to PDF</button>
        <button class="tab" role="tab" data-tab="parse-edit-pdf" id="tab-parse">Parse &amp; edit</button>
        <button class="tab" role="tab" data-tab="sign-pdf" id="tab-sign">Sign</button>
    </nav>

    <main class="workspace">
        <section class="input-panel">
            <div id="html-to-pdf-tab" class="tab-content">
                <div class="toolbar">
                    <label class="field">
                        <span>Example</span>
                        <select id="html-examples">
                            <option value="invoice">Invoice</option>
                            <option value="recipe">Recipe</option>
                            <option value="report">Report</option>
                            <option value="blank">Blank</option>
                        </select>
                    </label>
                    <label class="field">
                        <span>Page</span>
                        <select id="page-size">
                            <option value="a4">A4</option>
                            <option value="letter">Letter</option>
                            <option value="a5">A5</option>
                        </select>
                    </label>
                    <label class="field checkbox">
                        <input type="checkbox" id="opt-page-numbers">
                        <span>Page numbers</span>
                    </label>
                    <span class="spacer"></span>
                    <button id="add-font-html" class="ghost">+ Font</button>
                    <button id="add-image-html" class="ghost">+ Image</button>
                    <button id="save-config" class="ghost">Export</button>
                    <button id="load-config" class="ghost">Import</button>
                </div>
                <div id="html-resources" class="chips" hidden></div>
                <div class="editor-wrap">
                    <div class="gutter" id="html-gutter" aria-hidden="true"></div>
                    <textarea id="html-editor" class="editor" spellcheck="false" wrap="off" aria-label="HTML source"></textarea>
                </div>
            </div>

            <div id="parse-edit-pdf-tab" class="tab-content" hidden>
                <div class="toolbar">
                    <button id="upload-pdf">Upload PDF</button>
                    <span id="parse-summary" class="doc-summary" hidden></span>
                </div>
                <div id="pdf-resources" class="res-list" hidden></div>
                <div class="editor-wrap">
                    <div class="gutter" id="json-gutter" aria-hidden="true"></div>
                    <textarea id="json-editor" class="editor" spellcheck="false" wrap="off" aria-label="PDF document as JSON"></textarea>
                </div>
            </div>

            <div id="sign-pdf-tab" class="tab-content" hidden>
                <div class="toolbar column">
                    <button id="sign-upload-pdf">Upload PDF</button>
                    <label class="field file">
                        <span>Signature image</span>
                        <input type="file" id="signature-image-upload" accept="image/*">
                    </label>
                    <div class="sign-grid">
                        <label class="field"><span>Page</span><input type="number" id="signature-page" value="1" min="1"></label>
                        <label class="field"><span>X</span><input type="number" id="signature-x" value="50"></label>
                        <label class="field"><span>Y</span><input type="number" id="signature-y" value="50"></label>
                        <label class="field"><span>Scale</span><input type="number" id="signature-scale" value="0.5" step="0.1" min="0.05"></label>
                    </div>
                    <button id="apply-signature" class="primary">Place signature</button>
                </div>
            </div>
        </section>

        <section class="output-panel">
            <div class="viewer-controls">
                <div class="view-toggle" id="view-toggle" hidden>
                    <button data-view="pdf" class="active">PDF</button>
                    <button data-view="html">HTML</button>
                </div>
                <button id="prev-page" title="Previous page">&lsaquo;</button>
                <span class="page-indicator">
                    <input type="number" id="page-number" value="1" min="1"> / <span id="page-count">0</span>
                </span>
                <button id="next-page" title="Next page">&rsaquo;</button>
                <span class="spacer"></span>
                <span id="warnings-badge" class="badge badge-warn" hidden>0 warnings</span>
                <button id="save-pdf" class="primary">Download PDF</button>
            </div>
            <div id="viewer-error" class="error-bar" hidden></div>
            <div class="viewer-split">
                <div class="preview-stack">
                    <div class="pdf-viewer" id="pdf-viewer" aria-label="PDF preview"></div>
                    <iframe id="html-preview" class="html-preview" sandbox title="Browser rendering of the HTML" hidden></iframe>
                </div>
                <aside class="sidebar">
                    <div class="sidebar-modes">
                        <button data-mode="minimap" class="active">Pages</button>
                        <button data-mode="layers">Layers</button>
                        <button data-mode="bookmarks">Bookmarks</button>
                    </div>
                    <div id="minimap-view" class="sidebar-content"></div>
                    <div id="layers-view" class="sidebar-content" hidden></div>
                    <div id="bookmarks-view" class="sidebar-content" hidden></div>
                </aside>
            </div>
            <div id="warnings-drawer" class="warnings-drawer" hidden></div>
        </section>
    </main>

    <input type="file" id="image-upload" accept="image/*" hidden>
    <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" hidden>
    <input type="file" id="pdf-file-upload" accept=".pdf,application/pdf" hidden>
    <input type="file" id="config-upload" accept=".json,application/json" hidden>

    <script src="./script.js" type="module"></script>
</body>
</html>
